<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPS Studio</title>
  <meta
    name="description"
    content="RPS Studio builds digital solutions with focus on clarity, performance and user experience."
  >
  <meta property="og:title" content="RPS Studio">
  <meta
    property="og:description"
    content="Digital solutions with focus on clarity, performance and user experience."
  >
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="RPS Studio">
  <meta
    name="twitter:description"
    content="Digital solutions with focus on clarity, performance and user experience."
  >
  <style>
    :root {
      --bg: #fcfbf8;
      --text: #171717;
      --muted: #616161;
      --button: #1d1d1f;
      --button-hover: #2b2b2d;
      --shadow: 0 8px 18px rgba(0, 0, 0, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
        "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: min(100% - 32px, 720px);
      margin: 0 auto;
      padding: 22px 0 56px;
      text-align: center;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .rps-logo {
      display: flex;
      align-items: center;
      margin-top: 30px;
      justify-content: center;
      gap: 14px;
      margin-bottom: 0;
      padding-bottom: 18px;
      position: relative;
    }

    .rps-logo::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 0;
      width: min(220px, 70%);
      height: 1px;
      background: rgba(23, 23, 23, 0.12);
      transform: translateX(-50%);
    }

    .rps-logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 85px;
      height: 58px;
      border-radius: 18px;
      color: #000000;
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .rps-logo-text {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text);
    }

    .tagline {
      margin: 18px 0 32px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 20px;
      margin-top: 15px;
      margin-bottom: 60px;
      border-radius: 999px;
      background: var(--button);
      color: #ffffff;
      font-size: 17px;
      font-weight: 600;
      line-height: 1;
      white-space: nowrap;
      transition: background-color 160ms ease, transform 160ms ease;
    }

    .cta:hover,
    .cta:focus-visible {
      background: var(--button-hover);
      transform: translateY(-1px);
    }

    .apps {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 80px;
      margin: 0 auto;
    }

    .app {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      width: auto;
      text-align: center;
      transition: transform 160ms ease, opacity 160ms ease;
    }

    .app:hover,
    .app:focus-visible {
      transform: translateY(-2px);
    }

    .app:hover img,
    .app:focus-visible img {
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
    }

    .app img {
      display: block;
      width: 92px;
      height: 92px;
      border-radius: 24px;
      box-shadow: var(--shadow);
      transition: box-shadow 160ms ease;
    }

    .app-name {
      margin-top: 10px;
      font-size: 12px;
      line-height: 1.25;
      color: var(--text);
    }

    @media (max-width: 480px) {
      .page {
        width: min(100% - 24px, 420px);
        padding-top: 18px;
      }

      .rps-logo {
        gap: 10px;
      }

      .rps-logo-mark {
        width: 64px;
        height: 52px;
        font-size: 24px;
      }

      .tagline {
        font-size: 14px;
      }

      .app img {
        width: 88px;
        height: 88px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-label="RPS Studio">
      <div class="rps-logo" aria-label="RPS Studio logo">
        <div class="rps-logo-mark">RPS</div>
        <div class="rps-logo-text">Studio</div>
      </div>

      <p class="tagline">
        Digital solutions with focus on clarity, performance and user experience.
      </p>

      <a class="cta" href="mailto:developer@robinsayyah.se">Get in touch</a>

      <div class="apps" aria-label="Featured apps">
        <a class="app" href="https://www.maggio.club" target="_blank" rel="noopener noreferrer">
          <img src="./images/maggio.png" alt="Maggio app icon">
          <div class="app-name">Maggio</div>
        </a>

        <a class="app" href="https://www.tidlogbook.com" target="_blank" rel="noopener noreferrer">
          <img src="./images/tidLogbook.png" alt="Tid - Logbook app icon">
          <div class="app-name">Tid - Logbook</div>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
