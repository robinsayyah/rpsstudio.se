<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPS Studio</title>
  <meta
    name="description"
    content="RPS Studio builds clean, thoughtful apps for Apple platforms."
  >
  <style>
    :root {
      --bg: #f4efe7;
      --surface: rgba(255, 252, 247, 0.8);
      --panel: rgba(255, 255, 255, 0.64);
      --text: #1c211d;
      --muted: #596357;
      --line: rgba(28, 33, 29, 0.12);
      --accent: #1f5c4a;
      --accent-strong: #174738;
      --shadow: 0 24px 60px rgba(34, 37, 32, 0.12);
      --radius: 28px;
      --max-width: 1120px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", Avenir, "Helvetica Neue", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(64, 122, 99, 0.18), transparent 34%),
        radial-gradient(circle at right center, rgba(199, 164, 111, 0.18), transparent 30%),
        linear-gradient(180deg, #f8f3eb 0%, var(--bg) 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page-shell {
      width: min(calc(100% - 32px), var(--max-width));
      margin: 20px auto;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 36px;
      background: var(--surface);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 8px 6px 28px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(135deg, #224b3d, #3f8369);
      color: #f7f3ea;
      font-weight: 700;
      letter-spacing: 0.06em;
    }

    .nav-link {
      padding: 10px 16px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.5);
      color: var(--text);
      transition: transform 180ms ease, background-color 180ms ease;
    }

    .nav-link:hover,
    .nav-link:focus-visible {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.9);
    }

    .hero-copy,
    .contact {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
    }

    .hero-copy {
      max-width: 760px;
      padding: clamp(32px, 5vw, 64px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(31, 92, 74, 0.08);
      color: var(--accent);
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 18px 0 12px;
      max-width: 11ch;
      font-size: clamp(2.5rem, 6.8vw, 5rem);
      line-height: 0.94;
      letter-spacing: -0.06em;
      font-weight: 700;
    }

    .hero-copy p {
      margin: 0;
      max-width: 34rem;
      font-size: 1rem;
      line-height: 1.6;
      color: var(--muted);
    }

    .contact {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-top: 22px;
      padding: clamp(22px, 3.2vw, 34px);
    }

    .contact h2 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 4vw, 3rem);
      letter-spacing: -0.05em;
    }

    .contact p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 178px;
      padding: 15px 24px;
      border-radius: 999px;
      background: var(--accent);
      color: #f7f3ea;
      font-weight: 600;
      transition: transform 180ms ease, background-color 180ms ease, box-shadow 180ms ease;
      box-shadow: 0 12px 24px rgba(31, 92, 74, 0.2);
    }

    .button:hover,
    .button:focus-visible {
      background: var(--accent-strong);
      transform: translateY(-1px);
      box-shadow: 0 18px 26px rgba(31, 92, 74, 0.22);
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 24px 8px 6px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    @media (max-width: 860px) {
      .contact {
        flex-direction: column;
        align-items: flex-start;
      }

      .button {
        width: 100%;
      }

      .footer {
        flex-direction: column;
      }
    }

    @media (prefers-reduced-motion: no-preference) {
      .hero-copy,
      .contact {
        animation: rise 700ms ease both;
      }

      .contact {
        animation-delay: 120ms;
      }
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(22px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <header class="topbar">
      <a class="brand" href="#top" aria-label="RPS Studio home">
        <span class="brand-mark">RPS</span>
        <span>RPS Studio</span>
      </a>
    </header>

    <section class="hero" id="top">
      <div class="hero-copy">
        <h1>Digital solutions, built with care.</h1>
        <p>
          RPS Studio aims to create curated solutions with focus on clarity, 
          performance and user experience.
        </p>
      </div>
    </section>

    <section class="contact" id="contact">
      <div>
        <h2>Let’s work together</h2>
        <p>Have an app idea or need a development partner? Reach out!</p>
      </div>
      <a class="button" href="mailto:developer@robinsayyah.se">Get in touch</a>
    </section>

    <footer class="footer">
    </footer>
  </main>
</body>
</html>
